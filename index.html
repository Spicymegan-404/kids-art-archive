<!DOCTYPE html>

<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>儿童艺术成长档案</title>

<link rel="stylesheet" href="styles.css">

<script src="lang.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

.section{
display:none;
}

.section.active{
display:block;
}

.tab{
cursor:pointer;
}

.tab.active{
color:#e7744a;
border-bottom:3px solid #e7744a;
}

</style>

</head>

<body>

<header class="hero">

<h1>🎨 <span data-i18n="siteTitle">儿童艺术成长档案</span></h1>
<p data-i18n="siteSubtitle">记录孩子每一次创作的闪光</p>

<div class="lang-switcher">

<button class="lang-btn" data-lang="en">EN</button> <button class="lang-btn" data-lang="zh">中文</button>

</div>

</header>

<nav class="tabs">

<span class="tab active" onclick="showTab('record')" data-i18n="navRecord">
创作记录
</span>

<span class="tab" onclick="showTab('year')" data-i18n="navYear">
年度合集
</span>

<span class="tab" onclick="showTab('portfolio')" data-i18n="navPortfolio">
作品集
</span>

</nav>

<main>

<div id="record" class="section active">

<div class="card">

<h2 data-i18n="uploadTitle">上传孩子的新作品</h2>

<form id="art-form">

<label data-i18n="labelTitle">作品名称</label> <input id="title" required>

<label data-i18n="labelArtist">创作者</label> <input id="artist">

<label data-i18n="labelAge">年龄</label> <input id="age">

<label data-i18n="labelStory">作品故事</label>

<textarea id="story"></textarea>

<label data-i18n="labelDate">创作日期</label> <input type="date" id="date">

<label data-i18n="labelImage">上传图片</label> <input type="file" id="image" accept="image/*">

<button type="submit" class="btn-primary" data-i18n="btnSave">
保存作品
</button>

</form>

</div>

</div>

<div id="year" class="section">

<div class="card">

<h2 data-i18n="navYear">年度合集</h2>

<div id="year-list"></div>

</div>

</div>

<div id="portfolio" class="section">

<div class="toolbar">

<button onclick="exportData()" class="btn-outline">
📦 <span data-i18n="btnExport">导出作品数据</span>
</button>

<button onclick="importData()" class="btn-outline">
📥 <span data-i18n="btnImport">导入作品数据</span>
</button>

<button onclick="downloadPDF()" class="btn-primary">
<span data-i18n="btnDownloadPDF">下载 PDF</span>
</button>

</div>

<div id="portfolio-grid"></div>

</div>

</main>

<input type="file" id="import-file" style="display:none" accept=".json">

<script>

function showTab(id){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active")
})

event.target.classList.add("active")

}

function getDrawings(){

try{
return JSON.parse(localStorage.getItem("kids_art_gallery"))||[]
}catch{
return[]
}

}

function renderPortfolio(){

const data=getDrawings()

const root=document.getElementById("portfolio-grid")

if(!data.length){

root.innerHTML="<p style='text-align:center;color:#999'>No artworks yet</p>"
return

}

root.innerHTML=data.map((d,i)=>`

<div class="art-card">

<img src="${d.imageUrl}" class="art-img">

<h3>${d.title}</h3>

<p>${d.date}</p>

<button onclick="share(${i})">Share</button>
<button onclick="poster(${i})">Poster</button>

</div>

`).join("")

}

function share(i){

const url=\`\${location.origin}/art.html?id=\${i}\`

if(navigator.share){

navigator.share({
title:"Kids Art",
url:url
})

}else{

navigator.clipboard.writeText(url)
alert("Link copied")

}

}

function poster(i){

location.href=\`art.html?id=\${i}&poster=1\`

}

function exportData(){

const data=getDrawings()

const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="kids-art-backup.json"

a.click()

}

function importData(){

document.getElementById("import-file").click()

}

document.getElementById("import-file").onchange=e=>{

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(){

localStorage.setItem("kids_art_gallery",reader.result)

location.reload()

}

reader.readAsText(file)

}

function downloadPDF(){

const element=document.getElementById("portfolio")

html2pdf().from(element).save("kids-art-portfolio.pdf")

}

renderPortfolio()

</script>

</body>
</html>
