<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4a261" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Kids Art Growth Journal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="index.html">🎨 儿童艺术成长档案</a>
      <nav class="site-nav">
        <a class="site-nav-link" href="index.html">🏠 首页</a>
        <a class="site-nav-link" href="portfolio.html">🖼 作品集</a>
        <a class="site-nav-link" href="#yearbook-section">📚 年度画册</a>
        <a class="site-nav-link active" href="#upload-section">➕ 添加作品</a>
        <div class="site-nav-lang">
          <button class="lang-btn site-nav-lang-btn active" data-lang="en" type="button">EN</button>
          <button class="lang-btn site-nav-lang-btn" data-lang="zh" type="button">中文</button>
        </div>
      </nav>
    </div>
  </div>

  <header>
    <h1 data-i18n="siteTitle">🎨 Kids Art Gallery</h1>
    <p class="subtitle" data-i18n="subtitle">A timeline of wonderful creations</p>
  </header>

  <!-- Tab navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-view="home" data-i18n="navHome">Home</button>
    <button class="tab-btn" data-view="yearly" data-i18n="navYearly">Yearly Collection</button>
    <a class="tab-btn" href="portfolio.html" data-i18n="navPortfolio">Portfolio PDF</a>
  </nav>

  <main>

    <!-- ── Home view ── -->
    <div id="view-home">

      <section class="upload-section" id="upload-section">
        <h2 data-i18n="uploadHeading">Add a New Drawing</h2>
        <form id="upload-form">
          <div class="form-group">
            <label for="drawing-title" data-i18n="labelTitle">Title</label>
            <input type="text" id="drawing-title"
              data-i18n-placeholder="placeholderTitle"
              placeholder="What did you draw?" required />
          </div>
          <div class="form-group">
            <label for="drawing-artist" data-i18n="labelArtist">Artist</label>
            <input type="text" id="drawing-artist"
              data-i18n-placeholder="placeholderArtist"
              placeholder="Who made this?" />
          </div>
          <div class="form-group">
            <label for="drawing-age" data-i18n="labelAge">Age</label>
            <input type="text" id="drawing-age"
              data-i18n-placeholder="placeholderAge"
              placeholder="e.g. 6, 5.5, 6y 3m" />
          </div>
          <div class="form-group">
            <label for="drawing-story" data-i18n="labelStory">Artwork Story</label>
            <textarea id="drawing-story" rows="3"
              data-i18n-placeholder="placeholderStory"
              placeholder="What inspired this drawing?"></textarea>
          </div>
          <div class="form-group">
            <label for="drawing-date" data-i18n="labelDate">Date</label>
            <input type="date" id="drawing-date" required />
          </div>
          <div class="form-group">
            <label for="drawing-image" class="file-label">
              <div class="file-drop-zone" id="drop-zone">
                <span class="drop-icon">📁</span>
                <span id="file-label-text" data-i18n="dropZone">Click or drag to upload image</span>
              </div>
            </label>
            <input type="file" id="drawing-image" accept="image/*" required />
          </div>
          <div id="image-preview-wrap" class="hidden">
            <img id="image-preview" src="" alt="Preview" />
          </div>
          <button type="submit" class="btn-add" data-i18n="btnAdd">Add to Gallery</button>
          <div id="save-confirmation" class="save-confirmation hidden" aria-live="polite">已保存 ✓</div>
        </form>
      </section>

      <section class="gallery-section">
        <h2 data-i18n="galleryHeading">Gallery</h2>
        <div id="empty-state" class="empty-state">
          <span data-i18n="emptyState">No drawings yet — add the first one above!</span>
        </div>
        <div id="gallery" class="gallery"></div>
      </section>

    </div><!-- /view-home -->

    <!-- ── Yearly Collection view ── -->
    <div id="view-yearly" class="hidden">
      <section class="yearly-section-wrapper" id="yearbook-section">
        <h2 data-i18n="yearlyHeading">Yearly Collection</h2>
        <div id="yearly-content"></div>
      </section>
    </div><!-- /view-yearly -->

  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="" />
      <div class="lightbox-info">
        <h3 id="lightbox-title"></h3>
        <p id="lightbox-artist"></p>
        <p id="lightbox-date"></p>
        <p id="lightbox-story" class="lightbox-story hidden"></p>
      </div>
    </div>
  </div>

  <script src="lang.js"></script>
  <script src="app.js"></script>
  <script src="ios-home-hint.js"></script>
</body>
</html>
