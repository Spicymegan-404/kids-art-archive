<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artwork</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="share-page">
  <div class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="index.html">🎨 儿童艺术成长档案</a>
      <nav class="site-nav">
        <a class="site-nav-link" href="index.html">🏠 首页</a>
        <a class="site-nav-link active" href="portfolio.html">🖼 作品集</a>
        <a class="site-nav-link" href="index.html#yearbook-section">📚 年度画册</a>
        <a class="site-nav-link" href="index.html#upload-section">➕ 添加作品</a>
      </nav>
    </div>
  </div>
  <div class="share-container" id="share-app"></div>

  <script src="lang.js"></script>
  <script>
    'use strict';

    let currentLang = localStorage.getItem('kids_art_lang') || 'en';
    function t(key) { return (LANG[currentLang] || LANG.en)[key] || LANG.en[key] || key; }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const locale = currentLang === 'zh' ? 'zh-CN' : 'en-US';
      return new Date(y, m - 1, d).toLocaleDateString(locale, {
        year: 'numeric', month: 'long', day: 'numeric',
      });
    }

    function getDrawings() {
      try { return JSON.parse(localStorage.getItem('kids_art_gallery')) || []; }
      catch { return []; }
    }

    function getArtworkImages(drawing) {
      const candidates = [];
      if (Array.isArray(drawing.imageUrls)) candidates.push(...drawing.imageUrls);
      if (Array.isArray(drawing.images)) candidates.push(...drawing.images);
      if (drawing.imageUrl) candidates.push(drawing.imageUrl);
      return candidates
        .filter((src, index, list) => typeof src === 'string' && src && list.indexOf(src) === index)
        .slice(0, 4);
    }

    function getCurrentArtwork() {
      const id = Number(new URLSearchParams(location.search).get('id'));
      if (!id) return null;
      return getDrawings().find(d => d.id === id) || null;
    }

    function render() {
      const app = document.getElementById('share-app');
      const artwork = getCurrentArtwork();

      if (!artwork) {
        document.title = t('shareNotFound');
        app.innerHTML = `
          <div class="share-empty">
            <h1>${esc(t('shareNotFound'))}</h1>
            <p><a class="back-link" href="portfolio.html">${esc(t('btnBackPortfolio'))}</a></p>
          </div>`;
        return;
      }

      const images = getArtworkImages(artwork);
      document.title = `${artwork.title} · ${t('sharePageTitle')}`;

      const meta = [];
      if (artwork.artist) meta.push(`<div class="share-meta-item">🎨 <strong>${esc(artwork.artist)}</strong></div>`);
      if (artwork.age) meta.push(`<div class="share-meta-item">🌱 <strong>${esc(artwork.age)}</strong></div>`);
      meta.push(`<div class="share-meta-item">📅 <strong>${esc(formatDate(artwork.date))}</strong></div>`);

      app.innerHTML = `
        <div class="share-header">
          <a class="back-link" href="portfolio.html">← ${esc(t('btnBackPortfolio'))}</a>
        </div>
        <article class="share-card">
          <div class="share-gallery">
            ${images.map((src, index) => `<img src="${esc(src)}" alt="${esc(artwork.title)} ${index + 1}" />`).join('')}
          </div>
          <h1 class="share-title">${esc(artwork.title)}</h1>
          <div class="share-meta">${meta.join('')}</div>
          ${artwork.story ? `<div class="share-story">${esc(artwork.story)}</div>` : ''}
        </article>`;
    }

    render();
  </script>
</body>
</html>
