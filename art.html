<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artwork</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#fafafa;
display:flex;
justify-content:center;
}

.container{
max-width:720px;
padding:40px 20px;
}

img{
width:100%;
border-radius:14px;
}

h1{
margin-top:20px;
}

.meta{
color:#777;
margin-top:6px;
}

.story{
margin-top:20px;
line-height:1.6;
font-size:16px;
}

.home{
display:inline-block;
margin-bottom:20px;
color:#666;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container" id="art"></div>

<script>

function getDrawings(){

try{
return JSON.parse(localStorage.getItem("kids_art_gallery"))||[]
}catch{
return[]
}

}

const params=new URLSearchParams(location.search)

const id=params.get("id")

const drawings=getDrawings()

const d=drawings[id]

if(!d){

document.getElementById("art").innerHTML="Artwork not found"

}else{

document.getElementById("art").innerHTML=`

<a class="home" href="index.html">← Home</a>

<img src="${d.imageUrl}">

<h1>${d.title||""}</h1>

<div class="meta">

${d.date||""}

</div>

<div class="story">

${d.story||""}

</div>

`

}

</script>

</body>
</html>
