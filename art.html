<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4a261" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Artwork</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="detail-page">
  <div class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="index.html">🎨 儿童艺术成长档案</a>
      <nav class="site-nav">
        <a class="site-nav-link" href="index.html">🏠 首页</a>
        <a class="site-nav-link active" href="portfolio.html">🖼 作品集</a>
        <a class="site-nav-link" href="index.html#yearbook-section">📚 年度画册</a>
        <a class="site-nav-link" href="index.html#upload-section">➕ 添加作品</a>
      </nav>
    </div>
  </div>

  <main class="detail-container" id="detail-app"></main>

  <script src="lang.js"></script>
  <script src="ios-home-hint.js"></script>
  <script>
    'use strict';

    let currentLang = localStorage.getItem('kids_art_lang') || 'en';
    function t(key) { return (LANG[currentLang] || LANG.en)[key] || LANG.en[key] || key; }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const locale = currentLang === 'zh' ? 'zh-CN' : 'en-US';
      return new Date(y, m - 1, d).toLocaleDateString(locale, {
        year: 'numeric', month: 'long', day: 'numeric',
      });
    }

    function getDrawings() {
      try { return JSON.parse(localStorage.getItem('kids_art_gallery')) || []; }
      catch { return []; }
    }

    function getArtworkImages(drawing) {
      const candidates = [];
      if (Array.isArray(drawing.imageUrls)) candidates.push(...drawing.imageUrls);
      if (Array.isArray(drawing.images)) candidates.push(...drawing.images);
      if (drawing.imageUrl) candidates.push(drawing.imageUrl);
      return candidates.filter((src, index, list) => typeof src === 'string' && src && list.indexOf(src) === index);
    }

    function getCurrentArtwork() {
      const id = Number(new URLSearchParams(location.search).get('id'));
      return getDrawings().find(d => d.id === id) || null;
    }

    function render() {
      const app = document.getElementById('detail-app');
      const artwork = getCurrentArtwork();

      if (!artwork) {
        document.title = t('shareNotFound');
        app.innerHTML = `
          <div class="timeline-empty">
            <h1>${esc(t('shareNotFound'))}</h1>
            <p><a class="back-link" href="portfolio.html">← ${esc(t('navPortfolio'))}</a></p>
          </div>`;
        return;
      }

      const images = getArtworkImages(artwork);
      const hero = images[0] || '';
      document.title = `${artwork.title} · ${t('sharePageTitle')}`;

      const meta = [];
      if (artwork.artist) meta.push(`<span class="detail-meta-item">🎨 <strong>${esc(artwork.artist)}</strong></span>`);
      if (artwork.age) meta.push(`<span class="detail-meta-item">🌱 <strong>${esc(artwork.age)}</strong></span>`);
      meta.push(`<span class="detail-meta-item">📅 <strong>${esc(formatDate(artwork.date))}</strong></span>`);

      app.innerHTML = `
        <a class="back-link" href="portfolio.html">← ${esc(t('navPortfolio'))}</a>
        <article class="detail-shell">
          <div class="detail-image-wrap">
            <img src="${esc(hero)}" alt="${esc(artwork.title)}" />
          </div>
          <h1 class="detail-title">${esc(artwork.title)}</h1>
          <div class="detail-meta">${meta.join('')}</div>
          ${artwork.story ? `<div class="detail-story">${esc(artwork.story)}</div>` : ''}
        </article>`;
    }

    render();
  </script>
</body>
</html>
