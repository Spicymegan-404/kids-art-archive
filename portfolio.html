<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="navPortfolio">Art Portfolio</title>

<link rel="stylesheet" href="styles.css">

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f7f3ef;
margin:0;
color:#333;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:white;
border-bottom:1px solid #eee;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.header-right{
display:flex;
align-items:center;
gap:10px;
}

.container{
max-width:820px;
margin:auto;
padding:30px 20px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.card img{
width:100%;
display:block;
}

.card-body{
padding:14px;
}

.card-title{
font-weight:700;
font-size:18px;
}

.card-date{
font-size:14px;
color:#888;
margin-top:4px;
}

.btn{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.btn-outline{
border:1px solid #ddd;
background:white;
}

.btn-main{
background:#f4845f;
color:white;
}

.lang-btn{
border:1px solid #ddd;
background:white;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">

<div class="header-left">
<a href="index.html">← Home</a>
<b data-i18n="navPortfolio">Art Portfolio</b>
</div>

<div class="header-right">

<button class="lang-btn" data-lang="en">EN</button>
<button class="lang-btn" data-lang="zh">中文</button>

<button class="btn btn-outline" id="btn-export" data-i18n="btnExport">Export</button>
<button class="btn btn-outline" id="btn-import" data-i18n="btnImport">Import</button>
<button class="btn btn-main" id="btn-download" data-i18n="btnDownloadPDF">PDF</button>

</div>
</div>

<input type="file" id="import-file" accept=".json" style="display:none">

<div class="container" id="gallery"></div>

<script src="lang.js"></script>

<script>

let currentLang = localStorage.getItem('kids_art_lang') || 'en'

function t(key){
return (LANG[currentLang]||LANG.en)[key] || key
}

function applyLang(){

document.querySelectorAll('[data-i18n]').forEach(el=>{
el.innerText=t(el.dataset.i18n)
})

}

document.querySelectorAll('.lang-btn').forEach(btn=>{
btn.onclick=()=>{
currentLang=btn.dataset.lang
localStorage.setItem('kids_art_lang',currentLang)
applyLang()
}
})

function getDrawings(){

try{
return JSON.parse(localStorage.getItem('kids_art_gallery')) || []
}catch{
return []
}

}

function render(){

const data=getDrawings()

const root=document.getElementById("gallery")

if(!data.length){

root.innerHTML="<p style='text-align:center;color:#999'>No artworks</p>"
return

}

root.innerHTML=data.map((d,i)=>`

<div class="card">

<img src="${d.imageUrl}">

<div class="card-body">

<div class="card-title">${d.title}</div>
<div class="card-date">${d.date}</div>

<br>

<button class="btn btn-main" onclick="share(${i})">Share</button>

</div>

</div>

`).join("")

}

function share(i){

const url=`${location.origin}/art.html?id=${i}`

if(navigator.share){

navigator.share({
title:"Kids Art Portfolio",
url:url
})

}else{

navigator.clipboard.writeText(url)
alert("Link copied")

}

}

document.getElementById("btn-export").onclick=()=>{

const data=getDrawings()

const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="art-backup.json"

a.click()

}

document.getElementById("btn-import").onclick=()=>{

document.getElementById("import-file").click()

}

document.getElementById("import-file").onchange=e=>{

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(){

localStorage.setItem("kids_art_gallery",reader.result)

location.reload()

}

reader.readAsText(file)

}

document.getElementById("btn-download").onclick=()=>{

window.print()

}

applyLang()

render()

</script>

</body>
</html>
