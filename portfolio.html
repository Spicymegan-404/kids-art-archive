<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Portfolio</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#fdf8f4;
}

.controls{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
border-bottom:1px solid #eee;
background:white;
}

.controls-left{
display:flex;
gap:12px;
align-items:center;
}

.controls-right{
display:flex;
gap:10px;
}

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
}

.art-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

@media(max-width:600px){
.art-grid{
grid-template-columns:1fr;
}
}

.art-card{
background:white;
border-radius:12px;
overflow:hidden;
border:1px solid #eee;
}

.art-card img{
width:100%;
aspect-ratio:4/3;
object-fit:cover;
}

.art-card-body{
padding:10px;
}

.title{
font-weight:700;
margin-bottom:4px;
}

.meta{
font-size:13px;
color:#666;
}

.btn{
margin-top:8px;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.share{
background:#f4845f;
color:white;
}

.poster{
background:#333;
color:white;
}

</style>
</head>

<body>

<div class="controls">

<div class="controls-left">

<a href="index.html">← Home</a>

<b>Art Portfolio</b>

</div>

<div class="controls-right">

<button id="btn-export">Export</button>

<button id="btn-import">Import</button>

<button id="btn-download">PDF</button>

</div>

</div>

<input type="file" id="import-file" accept=".json" style="display:none">

<div class="container">

<div id="gallery"></div>

</div>

<script>

function getDrawings(){
try{
return JSON.parse(localStorage.getItem("kids_art_gallery"))||[]
}catch{
return[]
}
}

function render(){

const gallery=document.getElementById("gallery")

const drawings=getDrawings()

if(drawings.length===0){
gallery.innerHTML="<p>No artworks yet</p>"
return
}

let html=`<div class="art-grid">`

drawings.forEach((d,i)=>{

html+=`

<div class="art-card">

<img src="${d.imageUrl}">

<div class="art-card-body">

<div class="title">${d.title||""}</div>

<div class="meta">${d.date||""}</div>

<button class="btn share" onclick="share(${i})">
Share
</button>

<button class="btn poster" onclick="poster(${i})">
Poster
</button>

</div>

</div>

`

})

html+=`</div>`

gallery.innerHTML=html

}

render()

function share(i){

const url=`${location.origin}/art.html?id=${i}`

navigator.clipboard.writeText(url)

alert("Share link copied:\n"+url)

}

function poster(i){

const drawings=getDrawings()
const d=drawings[i]

const canvas=document.createElement("canvas")

canvas.width=800
canvas.height=1000

const ctx=canvas.getContext("2d")

const img=new Image()
img.crossOrigin="anonymous"
img.src=d.imageUrl

img.onload=function(){

ctx.fillStyle="#ffffff"
ctx.fillRect(0,0,800,1000)

ctx.drawImage(img,50,80,700,520)

ctx.fillStyle="#000"

ctx.font="bold 36px system-ui"
ctx.fillText(d.title||"",50,650)

ctx.font="22px system-ui"
ctx.fillText(d.date||"",50,690)

ctx.font="20px system-ui"
ctx.fillText("Kids Art Archive",50,940)

const url=canvas.toDataURL()

const a=document.createElement("a")
a.href=url
a.download="art-poster.png"

a.click()

}

}

document.getElementById("btn-export").onclick=()=>{

const data=getDrawings()

const blob=new Blob([JSON.stringify(data,null,2)])

const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="kids-art-backup.json"

a.click()

}

document.getElementById("btn-import").onclick=()=>{
document.getElementById("import-file").click()
}

document.getElementById("import-file").addEventListener("change",e=>{

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(){

localStorage.setItem("kids_art_gallery",reader.result)

location.reload()

}

reader.readAsText(file)

})

document.getElementById("btn-download").onclick=async()=>{

if(!window.html2pdf){

const s=document.createElement("script")
s.src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"

document.head.appendChild(s)

await new Promise(r=>s.onload=r)

}

html2pdf().set({

margin:10,
filename:"portfolio.pdf",
image:{type:"jpeg",quality:0.95},
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4"}

}).from(document.body).save()

}

</script>

</body>
</html>
