<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Growth Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #fdf8f4;
      --surface: #ffffff;
      --border:  #e8ddd4;
      --primary: #f4845f;
      --text:    #3a2e27;
      --muted:   #9e8878;
      --radius:  14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
/* PDF layout fix */
#pdf-root {
  max-width: 800px;
  margin: 0 auto;
}   
    /* ── Controls bar (hidden in PDF) ── */
    .controls {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(253,248,244,.92);
      backdrop-filter: blur(6px);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: .7rem 1.4rem;
    }
    .controls-left { display: flex; align-items: center; gap: .9rem; }
    .controls-right { display: flex; align-items: center; gap: .8rem; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .85rem;
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      transition: color .15s;
    }
    .back-link:hover { color: var(--primary); }

    .page-heading {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Lang switcher ── */
    .lang-switcher { display: flex; align-items: center; gap: .3rem; }
    .lang-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .22rem .52rem;
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: color .15s;
    }
    .lang-btn:hover, .lang-btn.active { color: var(--primary); }
    .lang-sep { color: var(--border); font-size: .85rem; }

    /* ── Buttons ── */
    .btn-download {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .5rem 1.2rem;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .btn-download:hover    { opacity: .88; }
    .btn-download:disabled { opacity: .55; cursor: default; }

    .btn-outline {
      background: none;
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: .48rem 1rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Main content ── */
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.2rem 5rem;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── Cover page ── */
    .pdf-cover {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 3rem 2rem;
      margin-bottom: 3rem;
      text-align: center;
      border: 2.5px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      position: relative;
      page-break-after: always;
      break-after: page;
    }
    .pdf-cover::before,
    .pdf-cover::after {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      pointer-events: none;
    }
    .pdf-cover::after {
      inset: 16px;
      border-style: dashed;
      opacity: .45;
    }
    .cover-icon {
      font-size: 3.2rem;
      margin-bottom: 1.2rem;
      line-height: 1;
    }
    .cover-title {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 900;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: .6rem;
    }
    .cover-subtitle {
      font-size: clamp(.95rem, 2.5vw, 1.15rem);
      color: var(--muted);
      margin-bottom: 2.5rem;
    }
    .cover-divider {
      width: 60px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
      margin: 0 auto 2.5rem;
    }
    .cover-artist {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .6rem;
    }
    .cover-artist-label {
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: .25rem;
    }
    .cover-stats {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .cover-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .15rem;
    }
    .cover-stat-value {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
    }
    .cover-stat-label {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ── Year section ── */
    .year-section { margin-bottom: 3rem; }
    .year-heading {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 1.2rem;
      padding-bottom: .5rem;
      border-bottom: 2px solid var(--border);
    }

    /* ── Artwork grid ── */
    .art-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.4rem;
    }
    @media (max-width: 520px) {
      .art-grid { grid-template-columns: 1fr; }
    }

    .art-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .art-card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: var(--bg);
    }
    .art-card-body {
      padding: .9rem 1rem;
    }
    .art-card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: .5rem;
      line-height: 1.3;
    }
    .art-card-meta-row {
      display: flex;
      flex-direction: column;
      gap: .2rem;
      margin-bottom: .4rem;
    }
    .art-card-meta-item {
      display: flex;
      align-items: baseline;
      gap: .35rem;
      font-size: .8rem;
    }
    .art-card-meta-label {
      color: var(--muted);
      min-width: 3.2em;
      flex-shrink: 0;
    }
    .art-card-meta-value {
      color: var(--text);
      font-weight: 600;
    }
    .art-card-story {
      font-size: .8rem;
      color: var(--text);
      line-height: 1.65;
      white-space: pre-wrap;
      margin-top: .6rem;
      padding-top: .6rem;
      border-top: 1px solid var(--border);
    }

    /* ── PDF footer ── */
    .pdf-footer {
      text-align: center;
      margin-top: 3rem;
      font-size: .78rem;
      color: var(--muted);
      border-top: 1.5px solid var(--border);
      padding-top: 1rem;
    }

    /* ── Print / PDF overrides ── */
    @media print {
      .controls { display: none !important; }
      body { background: #fff; }
      .art-card { border: 1px solid #ccc; }
      .pdf-cover { border-color: #ccc; }
    }
  </style>
</head>
<body>

  <button id="generate-pdf-btn">Download Portfolio PDF</button>  <!-- Controls bar (not included in PDF) -->
  
  <div class="controls" id="controls">
    <div class="controls-left">
      <a class="back-link" href="index.html">← <span data-i18n="navHome">Home</span></a>
      <span class="page-heading" data-i18n="portfolioHeading">Art Growth Portfolio</span>
    </div>
    <div class="controls-right">
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="en">EN</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="zh">中文</button>
      </div>
      <button class="btn-outline" id="btn-export" data-i18n="btnExport">📦 Export Data</button>
      <button class="btn-outline" id="btn-import" data-i18n="btnImport">📥 Import Data</button>
      <button class="btn-download" id="btn-download" data-i18n="btnDownloadPDF">Download PDF</button>
    </div>
    <!-- Hidden file input for import -->
    <input type="file" id="import-file" accept=".json" style="display:none" />
  </div>

  <!-- PDF content -->
  <div class="container" id="pdf-root"></div>

  <script src="lang.js"></script>
  <script>
    'use strict';

    /* ── i18n ── */
    let currentLang = localStorage.getItem('kids_art_lang') || 'en';
    function t(key) { return (LANG[currentLang] || LANG['en'])[key] || LANG['en'][key] || key; }

    function applyLangBtns() {
      document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.title = t('portfolioHeading');
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentLang = btn.dataset.lang;
        localStorage.setItem('kids_art_lang', currentLang);
        render();
      });
    });

    /* ── Data ── */
    function getDrawings() {
      try { return JSON.parse(localStorage.getItem('kids_art_gallery')) || []; }
      catch { return []; }
    }

    /* ── Date formatting ── */
    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const locale = currentLang === 'zh' ? 'zh-CN' : 'en-US';
      return new Date(y, m - 1, d).toLocaleDateString(locale, {
        year: 'numeric', month: 'long', day: 'numeric',
      });
    }

    /* ── Escape HTML ── */
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ── Render ── */
    function render() {
      applyLangBtns();

      const root = document.getElementById('pdf-root');
      const drawings = getDrawings();

      if (drawings.length === 0) {
        root.innerHTML = `<div class="empty-state">${esc(t('portfolioEmpty'))}</div>`;
        return;
      }

      // Artist name from localStorage
      const artistName = localStorage.getItem('kids_art_artist') || '';

      // Group by year, newest first
      const byYear = {};
      drawings.forEach(d => {
        const y = d.date.slice(0, 4);
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(d);
      });
      const years = Object.keys(byYear).sort((a, b) => b - a);
      const total = drawings.length;

      const today = new Date().toLocaleDateString(
        currentLang === 'zh' ? 'zh-CN' : 'en-US',
        { year: 'numeric', month: 'long', day: 'numeric' }
      );

      // ── Cover page ──
      const artistRowHtml = artistName ? `
        <div class="cover-artist-label">${esc(t('labelArtist'))}</div>
        <div class="cover-artist">${esc(artistName)}</div>` : '';

      let html = `
        <div class="pdf-cover">
          <div class="cover-icon">🎨</div>
          <div class="cover-title">${esc(t('siteTitle').replace(/^🎨\s*/, ''))}</div>
          <div class="cover-subtitle">${esc(t('portfolioCoverSub'))}</div>
          <div class="cover-divider"></div>
          ${artistRowHtml}
          <div class="cover-stats">
            <div class="cover-stat">
              <span class="cover-stat-value">${total}</span>
              <span class="cover-stat-label">${esc(t('pdfArtworks'))}</span>
            </div>
            <div class="cover-stat">
              <span class="cover-stat-value">${years.length}</span>
              <span class="cover-stat-label">${currentLang === 'zh' ? '年' : 'years'}</span>
            </div>
          </div>
          <div class="cover-stats" style="margin-top:.8rem;">
            <span>${esc(t('pdfGeneratedOn'))} ${today}</span>
          </div>
        </div>`;

      // ── Year sections ──
      years.forEach(year => {
        const items = byYear[year].slice().sort((a, b) => b.date.localeCompare(a.date));
        html += `<div class="year-section"><div class="year-heading">${esc(year)}</div><div class="art-grid">`;

        items.forEach(d => {
          const metaRows = [];
          if (d.artist) metaRows.push(`
            <div class="art-card-meta-item">
              <span class="art-card-meta-label">🎨</span>
              <span class="art-card-meta-value">${esc(d.artist)}</span>
            </div>`);
          if (d.age) metaRows.push(`
            <div class="art-card-meta-item">
              <span class="art-card-meta-label">🌱 ${esc(t('labelAge'))}</span>
              <span class="art-card-meta-value">${esc(d.age)}</span>
            </div>`);
          metaRows.push(`
            <div class="art-card-meta-item">
              <span class="art-card-meta-label">📅</span>
              <span class="art-card-meta-value">${esc(formatDate(d.date))}</span>
            </div>`);

          const storyHtml = d.story
            ? `<div class="art-card-story">${esc(d.story)}</div>`
            : '';

          html += `
            <div class="art-card">
              <img class="art-card-img" src="${d.imageUrl}" alt="${esc(d.title)}" />
              <div class="art-card-body">
                <div class="art-card-title">${esc(d.title)}</div>
                <div class="art-card-meta-row">${metaRows.join('')}</div>
                ${storyHtml}
              </div>
            </div>`;
        });

        html += `</div></div>`;
      });

      html += `<div class="pdf-footer">${esc(t('shareFooter'))} ${esc(t('siteTitle'))}</div>`;
      root.innerHTML = html;
    }

    /* ── Export ── */
    document.getElementById('btn-export').addEventListener('click', () => {
      const artworks = getDrawings();
      const payload = {
        app:          'Kids Art Archive',
        version:      '1.0',
        exportDate:   new Date().toISOString().slice(0, 10),
        artworkCount: artworks.length,
        artworks,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'kids-art-backup.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    /* ── Import ── */
    document.getElementById('btn-import').addEventListener('click', () => {
      document.getElementById('import-file').value = '';
      document.getElementById('import-file').click();
    });

    document.getElementById('import-file').addEventListener('change', (ev) => {
      const file = ev.target.files[0];
      if (!file) return;

      const existing = getDrawings();
      if (existing.length > 0 && !window.confirm(t('importConfirm'))) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data.artworks)) throw new Error('invalid');
          localStorage.setItem('kids_art_gallery', JSON.stringify(data.artworks));
          alert(t('importSuccess'));
          location.reload();
        } catch {
          alert(t('importError'));
        }
      };
      reader.readAsText(file);
    });

    /* ── PDF download ── */
    document.getElementById('btn-download').addEventListener('click', async () => {
      const btn = document.getElementById('btn-download');
      btn.disabled = true;
      btn.textContent = t('pdfGenerating');

      if (!window.html2pdf) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      const element = document.getElementById('pdf-root');
      const filename = `${t('portfolioCover')}.pdf`;

      const opt = {
        margin:      [10, 10, 10, 10],
        filename:    filename,
        image:       { type: 'jpeg', quality: 0.92 },
        html2canvas: { scale: 1, useCORS: true, logging: false },
        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:   { mode: ['avoid-all', 'css', 'legacy'] },
      };

      try {
        await html2pdf().set(opt).from(element).save();
      } catch (e) {
        console.error(e);
      }

      btn.disabled = false;
      btn.textContent = t('btnDownloadPDF');
    });

    /* ── Init ── */
    render();
  </script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
