<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Growth Portfolio</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
--bg:#fdf8f4;
--surface:#ffffff;
--border:#e8ddd4;
--primary:#f4845f;
--text:#3a2e27;
--muted:#9e8878;
--radius:14px;
}

body{
font-family:'Segoe UI',system-ui,sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
}

/* 修复电脑居中 + 手机PDF裁切 */
#pdf-root{
max-width:800px;
width:100%;
margin:0 auto;
}

/* 控制栏 */
.controls{
position:sticky;
top:0;
z-index:20;
background:rgba(253,248,244,.92);
backdrop-filter:blur(6px);
border-bottom:1.5px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
gap:1rem;
padding:.7rem 1.4rem;
}

.controls-left{display:flex;align-items:center;gap:.9rem;}
.controls-right{display:flex;align-items:center;gap:.8rem;}

.page-heading{
font-size:1rem;
font-weight:700;
}

.lang-switcher{display:flex;align-items:center;gap:.3rem;}

.lang-btn{
background:none;
border:1px solid var(--border);
color:var(--muted);
padding:.22rem .52rem;
border-radius:6px;
font-size:.78rem;
font-weight:600;
cursor:pointer;
}

.lang-btn.active{color:var(--primary);}

.btn-download{
background:var(--primary);
color:#fff;
border:none;
border-radius:8px;
padding:.5rem 1.2rem;
font-size:.88rem;
font-weight:700;
cursor:pointer;
}

.btn-outline{
background:none;
border:1.5px solid var(--border);
border-radius:8px;
padding:.48rem 1rem;
font-size:.85rem;
font-weight:600;
cursor:pointer;
}

/* 主容器 */
.container{
max-width:780px;
margin:0 auto;
padding:2rem 1.2rem 5rem;
}

/* 封面 */
.pdf-cover{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:60vh;
padding:3rem 2rem;
margin-bottom:3rem;
text-align:center;
border:2.5px solid var(--border);
border-radius:20px;
background:var(--surface);
page-break-after:always;
}

.cover-title{
font-size:2.2rem;
font-weight:900;
margin-bottom:.6rem;
}

.cover-subtitle{
color:var(--muted);
margin-bottom:2rem;
}

/* 年份 */
.year-section{margin-bottom:3rem;}

.year-heading{
font-size:1.4rem;
font-weight:800;
margin-bottom:1.2rem;
padding-bottom:.5rem;
border-bottom:2px solid var(--border);
}

/* 网格 */
.art-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:1.4rem;
}

@media(max-width:520px){
.art-grid{grid-template-columns:1fr;}
}

/* 卡片 */
.art-card{
background:var(--surface);
border:1.5px solid var(--border);
border-radius:var(--radius);
overflow:hidden;
page-break-inside:avoid;
}

.art-card-img{
width:100%;
aspect-ratio:4/3;
object-fit:cover;
display:block;
}

.art-card-body{
padding:.9rem 1rem;
}

.art-card-title{
font-weight:700;
margin-bottom:.5rem;
}

.art-card-story{
font-size:.8rem;
margin-top:.6rem;
padding-top:.6rem;
border-top:1px solid var(--border);
}

/* PDF footer */
.pdf-footer{
text-align:center;
margin-top:3rem;
font-size:.78rem;
color:var(--muted);
border-top:1.5px solid var(--border);
padding-top:1rem;
}

@media print{
.controls{display:none!important;}
body{background:#fff;}
}
</style>
</head>

<body>

<!-- 控制栏 -->
<div class="controls">

<div class="controls-left">
<span class="page-heading">Art Growth Portfolio</span>
</div>

<div class="controls-right">

<div class="lang-switcher">
<button class="lang-btn active">EN</button>
<button class="lang-btn">中文</button>
</div>

<button class="btn-outline" id="btn-export">📦 Export Data</button>
<button class="btn-outline" id="btn-import">📥 Import Data</button>
<button class="btn-download" id="btn-download">Download PDF</button>

</div>
</div>

<input type="file" id="import-file" accept=".json" style="display:none"/>

<!-- 作品区域 -->
<div class="container" id="pdf-root"></div>

<script src="lang.js"></script>

<script>
'use strict';

function getDrawings(){
try{return JSON.parse(localStorage.getItem('kids_art_gallery'))||[];}
catch{return[];}
}

function render(){

const root=document.getElementById('pdf-root');
const drawings=getDrawings();

if(drawings.length===0){
root.innerHTML="<div style='text-align:center;padding:4rem;color:#999'>No artworks yet</div>";
return;
}

let html=`<div class="pdf-cover">
<div class="cover-title">Children's Art Portfolio</div>
<div class="cover-subtitle">Little Artist Collection</div>
</div>`;

drawings.forEach(d=>{
html+=`
<div class="art-card">
<img class="art-card-img" src="${d.imageUrl}">
<div class="art-card-body">
<div class="art-card-title">${d.title||''}</div>
<div>${d.date||''}</div>
<div class="art-card-story">${d.story||''}</div>
</div>
</div>`;
});

html+=`<div class="pdf-footer">Generated by Kids Art Archive</div>`;

root.innerHTML=html;

}

document.getElementById('btn-download').addEventListener('click',async()=>{

if(!window.html2pdf){
const s=document.createElement('script');
s.src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js";
document.head.appendChild(s);
await new Promise(r=>s.onload=r);
}

const element=document.getElementById("pdf-root");

const opt={
margin:10,
filename:"portfolio.pdf",
image:{type:"jpeg",quality:0.95},
html2canvas:{scale:2,useCORS:true},
jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
};

html2pdf().set(opt).from(element).save();

});

render();
</script>

</body>
</html>
